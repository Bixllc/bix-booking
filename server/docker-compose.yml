services:
  postgres:
    image: postgres:16-alpine
    container_name: bix-booking-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bix
      POSTGRES_PASSWORD: bix
      POSTGRES_DB: bix_booking
    ports:
      - "5434:5432"
    volumes:
      - bix_booking_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bix -d bix_booking"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bix_booking_pgdata:
